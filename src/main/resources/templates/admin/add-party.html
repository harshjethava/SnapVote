<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Party</title>
  <style>
    body {
      background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
    }
    .main-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(80, 80, 160, 0.15);
      max-width: 1000px;
      min-width: 1000px;
      margin: 2.5vh auto;
      padding: 2rem 2.5rem 2rem 2.5rem;
      position: relative;
      min-height: 80vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .logo {
      font-weight: bold;
      font-size: 1.5rem;
      color: #7c3aed;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav {
      display: flex;
      gap: 2.5rem;
    }
    .nav a {
      text-decoration: none;
      color: #6d28d9;
      font-weight: 500;
      font-size: 1.08rem;
      transition: color 0.2s;
    }
    .nav a:hover {
      color: #a78bfa;
    }
    .admin-content {
      margin-top: 2.5rem;
      color: #4b5563;
      font-size: 1.2rem;
      text-align: center;
    }
    .party-form {
      margin: 2.5rem auto 0 auto;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      background: #f3f4f6;
      padding: 2rem 2.5rem;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(124,58,237,0.07);
    }
    .party-form label {
      font-size: 1.08rem;
      color: #6d28d9;
      font-weight: 500;
      text-align: left;
      margin-bottom: 0.3rem;
    }
    .party-form input {
      padding: 0.5rem 0.3rem;
      border-radius: 8px;
      border: 1.5px solid #a78bfa;
      font-size: 1rem;
      font-family: inherit;
      width: 100%;
      background: rgba(243, 244, 246, 0.9);
      transition: all 0.3s ease;
    }
    .party-form input:focus {
      border: 1.5px solid #7c3aed;
      outline: none;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.10);
    }
    .party-form button {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 1.8rem;
      font-size: 1.08rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
      width: 60%;
      align-self: center;
    }
    .party-form button:hover {
      background: #6d28d9;
    }
  </style>

    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      //warning
      function showPopupWhenVotingStart() {
      Swal.fire({
        icon: 'warning',
        title: 'Voting is in progress',
        text: 'You cannot add a new party while voting is active.',
        confirmButtonColor: '#7c3aed',
      }).then(() => {
        window.location.href = "/admin/admin-dashboard";
      });
    }
    //success
    function submitPartyForm(event) {
      event.preventDefault(); // Prevent default form submit

      Swal.fire({
        icon: 'success',
        title: 'Party Added!',
        text: 'The new party is being saved...',
        timer: 2500,
        showConfirmButton: false,
        allowOutsideClick: false,
        allowEscapeKey: false,
        willClose: () => {
          document.getElementById('partyForm').submit(); // Submit form manually
        }
      });then(() => {
        window.location.href = "/admin/admin-dashboard";
      });
   }
  </script>


    <link rel="icon" type="image/png" href="/favicon.png">
</head>
<body th:if="${votingOpen == false}">
  <div class="main-card">
    <div class="header">
      <div class="logo">
            ADMIN
      </div>
      <nav class="nav">
        <a th:href="@{/admin/admin-dashboard}" th:style="${activePage == 'home'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">Home</a>
        <a th:href="@{/admin/All-user}" th:style="${activePage == 'users'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">User Detail</a>
        <a th:href="@{/admin/toggle-vote}" th:style="${activePage == 'voting'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">Voting</a>
        <a th:href="@{/admin/add-party}" th:style="${activePage == 'add-party'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">Add Party</a>
        <a th:href="@{/admin/party-detail}" th:style="${activePage == 'party-detail'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">Party Detail</a>
        <a th:href="@{/admin/contact-messages}" th:style="${activePage == 'contact'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">Contact</a>
        <a th:href="@{/admin/about}" th:style="${activePage == 'about'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">About</a>
        <a th:href="@{/logout}">Logout</a>
      </nav>
    </div>
    <div class="admin-content">
      <h2 style="color:#7c3aed;">Add New Party</h2>
      <form id="partyForm" class="party-form" th:action="@{/admin/add-party}" method="post" enctype="multipart/form-data">
      <label for="partyName">Party Name</label>
        <input type="text" id="partyName" name="partyName" required>
        <label for="partySymbol">Party Symbol</label>
        <input type="text" id="partySymbol" name="partySymbol" required>
        <label for="logoFile">Party Logo</label>
        <input type="file" id="logoFile" name="logoFile" accept="image/png, image/jpeg, image/jpg, application/pdf" required style="background: white; padding: 0.3rem;">
        <button type="submit" onclick="submitPartyForm(event)">Add Party</button>
      </form>
    </div>
  </div>
</body>

<body th:if="${votingOpen}">
<script>
  showPopupWhenVotingStart();
</script>

</body>
</html>
