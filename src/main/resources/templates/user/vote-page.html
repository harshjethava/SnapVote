<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Vote Now</title>
  <style>
    body {
      background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
      font-family: 'Segoe UI', Arial, sans-serif;
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
    }
    .main-card {
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(80, 80, 160, 0.15);
      max-width: 900px;
      margin: 2.5vh auto;
      padding: 2rem 2.5rem 2rem 2.5rem;
      position: relative;
      min-height: 80vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }
    .logo {
      font-weight: bold;
      font-size: 1.5rem;
      color: #7c3aed;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .nav {
      display: flex;
      gap: 2.5rem;
    }
    .nav a {
      text-decoration: none;
      color: #6d28d9;
      font-weight: 500;
      font-size: 1.08rem;
      transition: color 0.2s;
    }
    .nav a:hover {
      color: #a78bfa;
    }
    .vote-content {
      margin-top: 2.5rem;
      color: #4b5563;
      font-size: 1.2rem;
      text-align: center;
    }
    .vote-form {
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }
    .vote-form label {
      font-size: 1.1rem;
      color: #6d28d9;
      font-weight: 500;
    }
    .vote-form select {
      padding: 0.4rem 1.2rem;
      border-radius: 8px;
      border: 1px solid #a78bfa;
      font-size: 1rem;
    }
    .vote-form button {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.8rem;
      font-size: 1.08rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .vote-form button:hover {
      background: #6d28d9;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    function showClosedPopup() {
        Swal.fire({
            icon: 'warning',
            title: 'Voting Closed',
            text: 'Voting is currently closed. Please try again later.',
            confirmButtonColor: '#7c3aed'
        }).then(() => {
        window.location.href = "/public/dashboard";
        });
    }

    function showUserVoted() {
        Swal.fire({
            icon: 'info',
            title: 'Already Voted',
            text: 'You have already cast your vote.',
            confirmButtonColor: '#7c3aed'
        }).then(() => {
        window.location.href = "/public/dashboard";
        });
    }

   function submitWithAlert(event) {
    event.preventDefault(); // Stop immediate form submission

    Swal.fire({
      icon: 'success',
      title: 'Vote Submitted',
      text: 'Your vote is being processed...',
      timer: 5000, // 5 seconds auto-close
      showConfirmButton: false, // hide OK button
      allowOutsideClick: false,
      allowEscapeKey: false,
      didClose: () => {
        // After alert closes, submit the form
        document.getElementById('voteForm').submit();
      }
    });
    }
  </script>

    <link rel="icon" type="image/png" href="/favicon.png">
</head>


<body>
  <!-- ✅ Voting Closed -->
  <div th:if="${!voteStatus}">
    <script>showClosedPopup();</script>
  </div>

  <!-- ✅ User Already Voted -->
  <div th:if="${userVoted}">
    <script>showUserVoted();</script>
  </div>

  <!-- ✅ Vote Form if allowed -->
  <div th:if="${voteStatus && !userVoted}">
  <div class="main-card">
    <div class="header">
      <div class="logo">
        <span th:text="${userName}"></span>
      </div>
      <nav class="nav">
        <a th:href="@{/public/dashboard}" th:style="${activePage == 'home'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">Home</a>
        <a th:href="@{/user/about}" th:style="${activePage == 'about'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">About</a>
        <a th:href="@{/user/vote}" th:style="${activePage == 'vote'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">Add Vote</a>
        <a th:href="@{/user/user-details}" th:style="${activePage == 'info'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">Info</a>
        <a th:href="@{/user/contact}" th:style="${activePage == 'contact'} ? 'font-weight: 700; border-bottom: 2px solid #7c3aed;' : ''">Contact</a>
        <a th:href="@{/logout}">Logout</a>
      </nav>
    </div>
    <div class="vote-content">
        <div style="background: #ede9fe; border-radius: 18px; box-shadow: 0 4px 18px rgba(124,58,237,0.10); padding: 2.5rem 2.5rem 2rem 2.5rem; max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; align-items: center;">
          <h2 style="color:#7c3aed; font-size:2.5rem; font-weight:800; margin-bottom:2.2rem; margin-top:0.3rem; letter-spacing:1px; text-shadow:0 2px 8px #a78bfa22;">Cast Your Vote</h2>
          <form class="vote-form"  th:action="@{/user/submit-vote}" method="post" style="width:100%;" id="voteForm">
            <label style="font-size:1.3rem; color:#6d28d9; font-weight:600; margin-bottom:-0.5rem; display:block; text-align:center;">Choose a Party:</label>
            <div style="display: flex; flex-direction: column; gap: 1.5rem; align-items: flex-start; margin: 1.2rem 0 2.2rem 0; width:100%;">
              <div th:each="party : ${parties}" style="display: flex; align-items: center; gap: 1.2rem;">
                <input type="radio" id="party__${party.name}" name="partyName" th:value="${party.name}" required style="width: 1.3em; height: 1.3em; accent-color: #7c3aed;">
                <img th:if="${party.base64Logo != null}" th:src="${party.base64Logo}" alt="Logo" width="45" height="45" style="border-radius: 50%; object-fit: cover; box-shadow: 0 2px 6px rgba(0,0,0,0.1);" />
                <label th:for="'party__' + ${party.name}" th:text="${party.name}" style="font-size: 1.35rem; color: #7c3aed; font-weight: 700; letter-spacing:0.5px;"></label>
              </div>
            </div>
            <button type="submit" style="background: linear-gradient(90deg, #6366f1 0%, #818cf8 100%); color: #fff; border: none; border-radius: 10px; padding: 1rem 0; font-size: 1.35rem; font-weight: 700; cursor: pointer; width: 100%; box-shadow: 0 4px 15px #a78bfa22; transition: background 0.2s;" onclick="submitWithAlert(event)">Vote</button>
      </form>
        </div>
      </div>
    </div>
  </div>


</body>

</html>
